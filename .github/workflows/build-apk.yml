name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'main.py'
      - 'buildozer.spec'
      - 'requirements.txt'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'main.py'
      - 'buildozer.spec'
      - 'requirements.txt'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest

    steps:
      - uses: actions/checkout@v4

      - name: Pre-download Android NDK r26d
        run: |
          mkdir -p ~/.buildozer/android/platform
          NDK_URL="https://dl.google.com/android/repository/android-ndk-r26d-linux.zip"
          NDK_ZIP="/tmp/android-ndk-r26d-linux.zip"
          echo "Downloading NDK r26d..."
          python3 -c "import urllib.request; urllib.request.urlretrieve('$NDK_URL', '$NDK_ZIP')"
          echo "Extracting NDK..."
          unzip -q "$NDK_ZIP" -d ~/.buildozer/android/platform/
          echo "Renaming directory to match buildozer expected name..."
          mv ~/.buildozer/android/platform/android-ndk-r26d ~/.buildozer/android/platform/android-ndk-r26.3.11579264
          echo "NDK ready"

      - name: Build APK with Buildozer (patched aiohttp)
        env:
          AIOHTTP_NO_EXTENSIONS: 1
        run: |
          # Phase 1: Let buildozer set up p4a venv (creates .buildozer/venv)
          echo "Setting up buildozer and p4a..."
          timeout 120 buildozer android p4a -- --help 2>&1 | tail -3 || true

          # Phase 2: Patch aiohttp recipe in buildozer's venv
          P4A_RECIPES=$(find .buildozer/venv -path "*/pythonforandroid/recipes" -type d 2>/dev/null | head -1)
          if [ -n "$P4A_RECIPES" ] && [ -f .p4a/recipes/aiohttp/__init__.py ]; then
            echo "Patching aiohttp recipe in buildozer venv: $P4A_RECIPES/aiohttp/"
            cp -v .p4a/recipes/aiohttp/__init__.py "$P4A_RECIPES/aiohttp/__init__.py"
            grep 'version' "$P4A_RECIPES/aiohttp/__init__.py" | head -1
          else
            # Fallback: try patching system Python p4a
            SYS_P4A=$(python3 -c "import pythonforandroid; print(pythonforandroid.__path__[0])" 2>/dev/null || echo "")
            if [ -n "$SYS_P4A" ] && [ -f .p4a/recipes/aiohttp/__init__.py ]; then
              echo "Patching aiohttp recipe in system Python: $SYS_P4A/recipes/aiohttp/"
              cp -v .p4a/recipes/aiohttp/__init__.py "$SYS_P4A/recipes/aiohttp/__init__.py"
              grep 'version' "$SYS_P4A/recipes/aiohttp/__init__.py" | head -1
            fi
          fi

          # Phase 2.5: Patch p4a build.gradle template for Gradle 8.14 implicit dependency validation
          P4A_TEMPLATES=$(find .buildozer/venv -path "*/bootstraps/common/build/templates" -type d 2>/dev/null | head -1)
          if [ -n "$P4A_TEMPLATES" ] && [ -f "$P4A_TEMPLATES/build.tmpl.gradle" ] && [ -f .github/build-gradle-fix.groovy ]; then
            echo "Patching build.gradle template in buildozer venv..."
            cat .github/build-gradle-fix.groovy >> "$P4A_TEMPLATES/build.tmpl.gradle"
            echo "Applied Gradle 8.14 implicit dependency fix"
          else
            # Fallback: try patching system Python p4a
            SYS_P4A=$(python3 -c "import pythonforandroid; print(pythonforandroid.__path__[0])" 2>/dev/null || echo "")
            if [ -n "$SYS_P4A" ] && [ -f .github/build-gradle-fix.groovy ]; then
              SYS_TEMPLATE="$SYS_P4A/bootstraps/common/build/templates/build.tmpl.gradle"
              if [ -f "$SYS_TEMPLATE" ]; then
                echo "Patching build.gradle template in system Python p4a: $SYS_TEMPLATE"
                cat .github/build-gradle-fix.groovy >> "$SYS_TEMPLATE"
                echo "Applied Gradle 8.14 implicit dependency fix"
              else
                echo "WARNING: Could not find build.tmpl.gradle at $SYS_TEMPLATE"
              fi
            else
              echo "WARNING: Could not find p4a build.gradle template or fix file"
            fi
          fi

          # Phase 3: Run the actual build
          echo "Starting build..."
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: yuanbaobot-debug-apk
          path: bin/*.apk
