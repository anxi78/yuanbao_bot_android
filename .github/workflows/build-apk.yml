name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'main.py'
      - 'buildozer.spec'
      - 'requirements.txt'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'main.py'
      - 'buildozer.spec'
      - 'requirements.txt'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:2025.06.01

    steps:
      - uses: actions/checkout@v4

      - name: Pre-download Android NDK r26d
        run: |
          mkdir -p ~/.buildozer/android/platform
          NDK_URL="https://dl.google.com/android/repository/android-ndk-r26d-linux.zip"
          NDK_ZIP="/tmp/android-ndk-r26d-linux.zip"
          echo "Downloading NDK r26d..."
          python3 -c "import urllib.request; urllib.request.urlretrieve('$NDK_URL', '$NDK_ZIP')"
          echo "Extracting NDK..."
          unzip -q "$NDK_ZIP" -d ~/.buildozer/android/platform/
          echo "Renaming directory to match buildozer expected name..."
          mv ~/.buildozer/android/platform/android-ndk-r26d ~/.buildozer/android/platform/android-ndk-r26.3.11579264
          echo "NDK ready"

      - name: Build APK with Buildozer
        run: |
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: yuanbaobot-debug-apk
          path: bin/*.apk
